    <text x="30" y="75" fill="#E8EEF2" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="600">1536d → 768d</text>
    <text x="30" y="102" fill="#9FB0BF" font-family="Inter,Arial,sans-serif" font-size="18">Edge contract + deterministic result published</text>
  </g>

  <g transform="translate(518 314)">
    <rect width="408" height="118" rx="24" fill="#0D1520" stroke="#1F3445"/>
    <text x="30" y="40" fill="#FFC857" font-family="JetBrains Mono,monospace" font-size="20">CLASSIC PROBLEMS</text>
    <text x="30" y="75" fill="#E8EEF2" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="600">Byzantine + Dining Philosophers</text>
    <text x="30" y="102" fill="#9FB0BF" font-family="Inter,Arial,sans-serif" font-size="18">Consensus, leases, and commons publication</text>
  </g>

  <g transform="translate(956 314)">
    <rect width="564" height="118" rx="24" fill="#0D1520" stroke="#1F3445"/>
    <text x="30" y="40" fill="#3DF0FF" font-family="JetBrains Mono,monospace" font-size="20">VALIDATED SURFACE</text>
    <text x="30" y="75" fill="#E8EEF2" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="600">Snapshot + Raw Results + Workflow</text>
    <text x="30" y="102" fill="#9FB0BF" font-family="Inter,Arial,sans-serif" font-size="18">Everything needed to reproduce the public claim surface</text>
  </g>
